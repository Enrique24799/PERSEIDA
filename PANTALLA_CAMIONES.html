<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pantalla de Camiones — Carga y expedición</title>
<style>
  :root {
    --head-bg: #2f5f8f;
    --border: #d7dee8;
    --grid: #eef2f7;
    --ink: #243140;
    --blue: #2f80ed;
    --magenta: #e6177f;
    /* colores de estado */
    --c-cargado:    #a7e0dd;   --c-cargado-ink:    #15403d;
    --c-encarga:    #7fdc84;   --c-encarga-ink:    #14401a;
    --c-anulado:    #f3a395;   --c-anulado-ink:    #5e1b10;
    --c-ptecargar:  #ef4123;   --c-ptecargar-ink:  #ffffff;
    --c-albaranado: #f4d836;   --c-albaranado-ink: #5b4a00;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, system-ui, Arial, sans-serif;
    color: var(--ink);
    background: #eef2f7;
    font-size: 13px;
  }
  .app { padding: 0 0 40px; }

  /* ---------- Barra de opciones (toolbar superior) ---------- */
  .toolbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar .opt-label { font-weight: 600; color: #41546a; }
  .toolbar .fld { display: flex; align-items: center; gap: 6px; }
  .toolbar label { color: #41546a; }
  input[type="text"], input[type="date"], select {
    font-size: 13px; padding: 6px 9px;
    border: 1px solid #b9c6d6; border-radius: 5px; background: #fff; color: var(--ink);
    outline: none;
  }
  input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(47,128,237,.15); }
  select.alm { min-width: 220px; }
  .chk-todos { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .chk-todos input { accent-color: var(--magenta); width: 16px; height: 16px; }
  button { cursor: pointer; font-family: inherit; }
  .btn-actualizar {
    background: var(--magenta); color: #fff; border: 1px solid var(--magenta);
    font-weight: 600; font-size: 13px; padding: 8px 16px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-actualizar:hover { background: #c9116d; }
  .toolico {
    width: 34px; height: 34px; border: 1px solid var(--border); background: #f7fafd;
    border-radius: 6px; color: #41546a; font-size: 16px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .toolico:hover { background: #e7eef7; border-color: #b9c6d6; }
  .toolico svg { display: block; }
  .toolico.ico-nuevo:hover  { background: #fff7d6; border-color: #e6c200; }
  .toolico.ico-anular:hover { background: #fdecea; border-color: #d9534f; }
  .toolbar .spacer { flex: 1 1 auto; }

  /* ---------- Buscador global ---------- */
  .searchbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 10px 14px; display: flex; justify-content: flex-end;
  }
  .search-wrap { position: relative; width: 320px; max-width: 100%; }
  .search-wrap input { width: 100%; padding-left: 32px; }
  .search-wrap .ic { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #8494a6; }

  /* ---------- Tabla principal ---------- */
  .tablewrap {
    background: #fff; border-bottom: 1px solid var(--border);
    overflow: auto; max-height: 74vh;
  }
  table.grid { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  table.grid thead th {
    position: sticky; top: 0; z-index: 6;
    background: #ffffff; color: #41546a; font-weight: 600;
    padding: 9px 10px; text-align: left;
    border-bottom: 1px solid var(--border); border-right: 1px solid var(--grid);
    white-space: nowrap;
  }
  table.grid thead th .th-in { display: flex; align-items: center; gap: 6px; justify-content: space-between; }
  table.grid thead th .funnel { color: #aab4c0; font-size: 11px; cursor: pointer; }
  table.grid thead th .funnel:hover { color: var(--blue); }
  /* fila de filtros por columna */
  table.grid thead tr.filterrow th {
    position: sticky; top: 38px; z-index: 5;
    background: #f7fafd; padding: 4px 6px; border-bottom: 1px solid var(--border);
  }
  table.grid thead tr.filterrow input {
    width: 100%; padding: 4px 6px; font-size: 12px; border: 1px solid #cdd8e4; border-radius: 4px;
  }
  table.grid thead tr.filterrow .fic { color: #aab4c0; font-size: 12px; text-align: center; display: block; }

  table.grid tbody td {
    padding: 7px 10px; border-bottom: 1px solid var(--grid); border-right: 1px solid var(--grid);
    white-space: nowrap;
  }
  table.grid tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.grid tbody td.center { text-align: center; }
  table.grid tbody td.mono { font-family: "Consolas", monospace; }
  /* columna de despliegue */
  .col-exp { width: 34px; text-align: center; }
  .exp-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border: 1px solid #cdd8e4; border-radius: 4px;
    background: #fff; color: #5b6b7d; font-size: 10px; cursor: pointer; user-select: none;
  }
  .exp-btn:hover { background: #eef4fc; border-color: var(--blue); color: var(--blue); }
  tr.mainrow.open .exp-btn { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* celda de estado (bloque de color que rellena la celda) */
  td.estado { font-weight: 700; letter-spacing: .2px; }
  td.estado.cargado    { background: var(--c-cargado);    color: var(--c-cargado-ink); }
  td.estado.encarga    { background: var(--c-encarga);    color: var(--c-encarga-ink); }
  td.estado.anulado    { background: var(--c-anulado);    color: var(--c-anulado-ink); }
  td.estado.ptecargar  { background: var(--c-ptecargar);  color: var(--c-ptecargar-ink); }
  td.estado.albaranado { background: var(--c-albaranado); color: var(--c-albaranado-ink); }

  /* columnas con ancho fijo y elipsis (cliente, matrícula) */
  td.cliente, th.cliente { max-width: 190px; overflow: hidden; text-overflow: ellipsis; }
  td.matricula, th.matricula { max-width: 130px; overflow: hidden; text-overflow: ellipsis; }

  tr.mainrow { cursor: pointer; }
  tr.mainrow:hover td { background: #f4f9ff; }
  tr.mainrow:hover td.estado.cargado    { background: #9cd7d4; }
  tr.mainrow:hover td.estado.encarga    { background: #74d079; }
  tr.mainrow:hover td.estado.anulado    { background: #ef9587; }
  tr.mainrow:hover td.estado.ptecargar  { background: #e2381c; }
  tr.mainrow:hover td.estado.albaranado { background: #eccd25; }

  /* fila seleccionada: resaltado magenta a todo lo ancho */
  tr.mainrow.sel td { background: var(--magenta) !important; color: #fff !important; }
  tr.mainrow.sel td.mono { color: #fff !important; }
  tr.mainrow.sel input[type="checkbox"] { accent-color: #fff; }

  /* ---------- Fila de detalle desplegada ---------- */
  tr.detailrow { display: none; }
  tr.detailrow.show { display: table-row; }
  tr.detailrow > td { padding: 0; background: #f0f5fb; border-bottom: 2px solid #c4d0de; }
  .detailwrap { padding: 10px 14px 14px 44px; }
  .detailtitle {
    font-size: 11.5px; color: #41546a; font-weight: 600; text-transform: uppercase;
    letter-spacing: .4px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
  }
  .detailtitle .pill {
    background: #e7f0fd; color: var(--blue); border-radius: 10px; padding: 2px 9px;
    font-size: 11px; font-weight: 600; letter-spacing: 0; text-transform: none;
  }

  /* sub-tabla de detalle: columnas AJUSTADAS al contenido */
  table.detail { border-collapse: collapse; background: #fff; border: 1px solid var(--border); font-size: 12px; }
  table.detail thead th {
    background: #eef3f9; color: #41546a; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .3px;
    padding: 6px 9px; text-align: left; border-bottom: 2px solid #c4d0de; border-right: 1px solid var(--border);
    white-space: nowrap;
  }
  table.detail tbody td {
    padding: 5px 9px; border-bottom: 1px solid var(--grid); border-right: 1px solid var(--grid);
    vertical-align: top;
  }
  table.detail tbody tr:hover td { background: #f4f9ff; }
  table.detail td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.detail td.center { text-align: center; }
  table.detail td.mono { font-family: "Consolas", monospace; white-space: nowrap; }
  /* anchos ajustados por columna */
  .d-linea    { width: 46px;  text-align: center; }
  .d-pedido   { width: 104px; }
  .d-entrega  { width: 84px;  }
  .d-codcli   { width: 100px; }
  .d-nomcli   { width: 150px; white-space: normal; }
  .d-material { width: 250px; white-space: normal; }
  .d-direccion{ width: 170px; white-space: normal; color: #51637a; }
  .d-uds      { width: 92px;  }
  .d-palets   { width: 70px;  }
  .d-completar{ width: 78px;  text-align: center; }
  .d-almdest  { width: 92px;  }
  .d-aniodoc  { width: 80px;  }
  .d-doctras  { width: 92px;  }
  .det-empty { padding: 14px; text-align: center; color: #8494a6; font-style: italic; }

  /* ---------- Leyenda de estados (footer fijo) ---------- */
  .legendbar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #fff; border-top: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    font-size: 12px; color: #41546a; box-shadow: 0 -2px 6px rgba(0,0,0,.04);
  }
  .legendbar .lg-title { font-weight: 600; display: inline-flex; align-items: center; gap: 7px; }
  .legendbar .lg-title .dotgray { width: 11px; height: 11px; border-radius: 50%; background: var(--blue); }
  .legendbar .items { display: flex; gap: 18px; flex-wrap: wrap; margin-left: auto; }
  .lg-item { display: inline-flex; align-items: center; gap: 6px; }
  .lg-dot { width: 12px; height: 12px; border-radius: 50%; }
  .lg-dot.pte  { background: #ef4123; }
  .lg-dot.enc  { background: #3cb371; }
  .lg-dot.car  { background: #6cc7e0; }
  .lg-dot.alb  { background: #f5d800; }
  .lg-dot.anu  { background: #e8634a; }

  .nores { padding: 28px; text-align: center; color: #8494a6; }
</style>
</head>
<body>

  <script id="tplNuevoCamion" type="text/html">
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuevo Camión — Carga y expedición</title>
<style>
  :root {
    --head-bg: #2f5f8f;
    --border: #d7dee8;
    --grid: #eef2f7;
    --ink: #243140;
    --blue: #2f80ed;
    --magenta: #e6177f;
    --ok: #27ae60;
    --bad: #d9534f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, system-ui, Arial, sans-serif;
    color: var(--ink);
    background: #eef2f7;
    font-size: 13px;
  }
  .app { padding: 0 0 24px; }

  /* ---------- Titlebar ---------- */
  .titlebar {
    background: linear-gradient(180deg, #37618f, #2f5f8f);
    color: #fff; padding: 10px 16px;
    font-size: 16px; font-weight: 600; letter-spacing: .3px;
    display: flex; align-items: center; gap: 10px;
  }
  .titlebar .tcode {
    font-size: 11px; font-weight: 700; background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.35); padding: 2px 8px; border-radius: 4px;
  }
  .titlebar .spacer { flex: 1; }

  /* ---------- Tabs ---------- */
  .tabs {
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; gap: 4px; padding: 0 12px;
  }
  .tab {
    padding: 11px 16px 9px; font-size: 13px; color: #5b6b7d; cursor: pointer;
    border-bottom: 3px solid transparent; font-weight: 600;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--magenta); border-bottom-color: var(--magenta); }
  .tabpane { display: none; padding: 14px 16px; }
  .tabpane.active { display: block; }

  /* ---------- Bloques / fieldsets ---------- */
  .block {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .block-title { font-size: 12px; color: #41546a; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; margin: 2px 0 12px; }
  fieldset { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px 12px; margin: 0; }
  legend { font-size: 11px; color: #5b6b7d; padding: 0 6px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

  .formgrid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px 16px; }
  .fld { display: flex; flex-direction: column; gap: 4px; }
  .fld label { font-size: 11px; color: #5b6b7d; font-weight: 600; }
  .fld.span2 { grid-column: span 2; } .fld.span3 { grid-column: span 3; }
  .fld.span4 { grid-column: span 4; } .fld.span5 { grid-column: span 5; }
  .fld.span6 { grid-column: span 6; }
  .fld.chkline { justify-content: flex-end; }
  .chkline label.inline { flex-direction: row; align-items: center; gap: 7px; display: inline-flex; cursor: pointer; font-weight: 600; color: #41546a; }

  input[type="text"], input[type="number"], input[type="date"], select, textarea {
    font-size: 13px; padding: 7px 9px;
    border: 1px solid #b9c6d6; border-radius: 5px; background: #fff; color: var(--ink);
    outline: none; width: 100%; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(47,128,237,.15); }
  textarea { resize: vertical; min-height: 120px; }
  input[type="checkbox"], input[type="radio"] { accent-color: var(--magenta); width: 15px; height: 15px; }

  /* ---------- Líneas de carga: 3 paneles ---------- */
  .search3 { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 12px; }
  .radios { display: flex; align-items: center; gap: 14px; }
  .radios label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .searchrow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .searchrow .almsel { width: 130px; }
  .searchrow .txt { flex: 1; min-width: 120px; }
  .btn-search {
    background: var(--magenta); color: #fff; border: 1px solid var(--magenta);
    border-radius: 6px; padding: 8px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-search:hover { background: #c9116d; }
  .det-mini { display: flex; gap: 12px; }
  .det-mini .fld { flex: 1; }

  /* ---------- Tablas ---------- */
  .tablewrap { overflow: auto; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  thead th {
    background: #eef3f9; color: #41546a; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .3px;
    padding: 8px 9px; text-align: left; border-bottom: 2px solid #c4d0de; border-right: 1px solid var(--border);
    white-space: nowrap;
  }
  thead tr.filterrow th {
    background: #f7fafd; padding: 3px 6px; border-bottom: 1px solid var(--border);
  }
  thead tr.filterrow .fic { color: #aab4c0; font-size: 12px; display: flex; flex-direction: column; align-items: center; line-height: .8; }

/* ---------- Cálculos de verificación de disponibilidad ---------- */
// Reservas de OTROS pedidos del mismo material con entrega anterior o igual.
function reservasOtros(code, fent, base, pos){
  const E = parseDmy(fent);
  let r = 0;
  PEDIDOS.forEach(p => p.pos.forEach(po => {
    if (po.mat !== code) return;
    if (p.base === base && po.n === pos) return;     // excluye la propia línea
    if (parseDmy(p.fent) <= E) r += po.cant;
  }));
  return r;
}
// Stock disponible verificado a la fecha de entrega = stock - reservas de otros.
function stockVerif(code, fent, base, pos){
  return ((MATS[code] || {}).stock || 0) - reservasOtros(code, fent, base, pos);
}
// Fabricación verificada = suma de órdenes que terminan antes/en la fecha de entrega.
function fabVerificada(code, fent){
  const E = parseDmy(fent);
  return (ORDENES[code] || []).filter(o => parseDmy(o.fFin) <= E).reduce((s, o) => s + o.qty, 0);
}
// ¿Tiene alguna orden con faltas de componentes?
function tieneFaltas(code){
  return (ORDENES[code] || []).some(o => (FALTAS[o.orden] || []).some(f => f.falta > 0));
}

// Fecha de referencia "hoy" (fecha de la pantalla / propuesta).
const HOY = '23/06/2026';
// Fecha en la que estará disponible al menos el 90% del pendiente del material
// (stock verificado + fabricación que va finalizando, acumulada por fecha fin).
function fechaDisponibilidad(r){
  const target = 0.9 * r.pdte;
  let acc = stockVerif(r.codMat, r.fent, r.base, r.pos);
  if (acc >= target) return HOY;                 // ya hay stock para el 90%
  const ords = (ORDENES[r.codMat] || []).slice().sort((a, b) => parseDmy(a.fFin) - parseDmy(b.fFin));
  for (const o of ords){ acc += o.qty; if (acc >= target) return o.fFin; }
  return null;                                    // nunca se alcanza el 90%
}
// Semáforo de disponibilidad (se evalúa en este orden de prioridad).
function semaforo(r){
  const sv = stockVerif(r.codMat, r.fent, r.base, r.pos);
  if (sv > r.pdte) return 'verde';                                 // stock verificado > cantidad pendiente
  const fd = fechaDisponibilidad(r);
  if (!fd || parseDmy(fd) > parseDmy(r.fent)) return 'rojo';       // no llega a la fecha de entrega
  if (tieneFaltas(r.codMat)) return 'naranja';                     // a tiempo, pero con faltas de componentes
  return 'verdeclaro';                                            // a tiempo (stock + fabricación)
}
const SEM_TXT = {
  verde:      'Stock verificado suficiente (> cantidad pendiente)',
  verdeclaro: 'Disponible (>=90%) antes o en la fecha de entrega',
  naranja:    'A tiempo, pero con faltas de componentes (riesgo)',
  rojo:       'No disponible para la fecha de entrega',
};

function buildResults(predicate){
  const out = [];
  PEDIDOS.forEach(p => {
    const cli = CLIS[p.cli] || { nom:'', ciudad:'', prov:'' };
    p.pos.forEach(po => {
      const m = MATS[po.mat] || { desc:'', stock:0, fab:0, alm:'' };
      const row = {
        base: p.base, pos: po.n,
        pedidoLabel: p.base + '-' + po.n,
        codCli: p.cli, nomCli: cli.nom, ciudad: cli.ciudad, area: cli.prov,
        alm: m.alm,
        fped: p.fped, fent: p.fent,
        codMat: po.mat, matDesc: m.desc,
        cant: po.cant, entrega: 0, pdte: po.cant,
        stock: m.stock, fab: m.fab, unidad: 'UN',
      };
      if (predicate(row)) out.push(row);
    });
  });
  return out;
}

function doSearch(){
  const modo = ($('input[name="modo"]:checked') || {}).value || 'pedido';
  const q = $('#fBusca').value.trim().toLowerCase();
  const alm = $('#fAlmacen').value;
  RESULTS = buildResults(row => {
    if (alm && row.alm !== alm) return false;
    if (!q) return true;
    if (modo === 'pedido')   return row.base.toLowerCase().includes(q) || row.pedidoLabel.toLowerCase().includes(q);
    if (modo === 'cliente')  return row.nomCli.toLowerCase().includes(q) || row.codCli.toLowerCase().includes(q);
    if (modo === 'material') return row.codMat.toLowerCase().includes(q) || row.matDesc.toLowerCase().includes(q);
    return true;
  });
  renderResults();
}

function doSearchDoc(){
  const doc = $('#fNDoc').value.trim().toLowerCase();

function showModal(){ $('#modalOv').classList.add('show'); }

function openOrdenes(i){
  const r = RESULTS[i];
  const ords = ORDENES[r.codMat] || [];
  const E = parseDmy(r.fent);

    return `<tr class="${pre ? 'pre' : ''}">

    </tr>`;

  $('#modalTitle').textContent = 'Órdenes de fabricación — ' + r.codMat + ' · ' + r.matDesc;
  $('#modalBody').innerHTML = `
    <p class="modal-note">Resaltadas en verde las órdenes que finalizan <b>antes o en</b> la fecha de entrega del pedido (<b>${esc(r.fent)}</b>).

    <div class="tablewrap"><table>
      <thead><tr><th>Orden</th><th>Fecha Inicio</th><th>Fecha Fin</th><th class="num">Cantidad</th><th class="center">¿Antes de entrega?</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  showModal();
}

function openFaltas(i){
  const r = RESULTS[i];
  const ords = ORDENES[r.codMat] || [];
  let rows = '';
  ords.forEach(o => {
    (FALTAS[o.orden] || []).filter(f => f.falta > 0).forEach(f => {
      rows += `<tr>
        <td class="mono">${esc(o.orden)}</td>
        <td class="mono">${esc(f.comp)}</td>
        <td>${esc(COMPS[f.comp] || '')}</td>

}

function openCompras(i){
  const r = RESULTS[i];
  const ords = ORDENES[r.codMat] || [];
  const comps = [];
  ords.forEach(o => (FALTAS[o.orden] || []).filter(f => f.falta > 0).forEach(f => { if (!comps.includes(f.comp)) comps.push(f.comp); }));

/* ---------- Agregar selección -> líneas de carga ---------- */
function agregarSeleccion(){
  const sel = $$('.ckPed').filter(c => c.checked).map(c => RESULTS[Number(c.dataset.i)]);
  if (!sel.length){ alert('Marque al menos un pedido en la tabla "Pedidos".'); return; }
  let added = 0;
  sel.forEach(r => {
    if (CARGA.some(l => l.base === r.base && l.pos === r.pos)) return;
    const udsPalet = (MATS[r.codMat] || {}).udsPalet || 1;
    CARGA.push({
      base: r.base, pos: r.pos,
      pedidoSap: pad10(r.base),
      entrega: '',
      codCli: r.codCli, cliDir: r.codCli, nomCli: r.nomCli,
      codMat: r.codMat, material: r.codMat + ' - ' + r.matDesc,
      dirEnvio: r.ciudad,
      tipoUnidad: r.cant,
      palets: Math.ceil(r.cant / udsPalet),
      udsXpalets: udsPalet,
      completo: false,
    });
    added++;
  });
  applyGestionEntregas();
  renderCarga();
  $$('.ckPed').forEach(c => { c.checked = false; c.closest('tr').classList.remove('rowsel'); });
  $('#chkAllPed').checked = false;
  if (!added) alert('Los pedidos seleccionados ya estaban en las líneas de carga.');
}

function applyGestionEntregas(){
  CARGA.forEach(l => {
    if (gestionEntregas){ if (!l.entrega) l.entrega = String(seqEntrega++); }
    else l.entrega = '';
  });
}

function renderCarga(){
  const tb = $('#tbodyCarga');
  if (!CARGA.length){
    tb.innerHTML = `<tr><td colspan="13"><div class="empty">No hay líneas de carga. Busque pedidos y pulse «Agregar Selección».</div></td></tr>`;
    $('#chkAllCarga').checked = false;

}

function quitarSeleccion(){
  const keep = [];
  $$('.ckCarga').forEach(c => { if (!c.checked) keep.push(CARGA[Number(c.dataset.i)]); });
  if (keep.length === CARGA.length){ alert('Marque las líneas de carga que desea quitar.'); return; }
  CARGA = keep;
  renderCarga();
}

/* ---------- Guardar -> generar camión y enviarlo a la pantalla principal ---------- */
function leerCabecera(){
  const fecha = $('#fFecha').value ? $('#fFecha').value.split('-').reverse().join('/') : '01/01/1900';
  return {
    estado: 'PTE CARGAR',
    cliente: CARGA.length ? CARGA[0].nomCli : '',
    tipoCamion: $('#fTipo').value || 'Trailer',
    coste: Number($('#fCoste').value) || 0,
    almacen: $('#fCentro').value.trim() || $('#fAlmacen').value || '',
    horaCarga: fecha,
    fechaDescarga: '01/01/1900',
    muelle: 0,
    matricula: $('#fRemolque').value.trim(),
    tractora: $('#fTractora').value.trim(),
    conductor: $('#fConductor').value.trim(),
    telefono: $('#fTelefono').value.trim(),
    traslado: $('#fTraslado').checked,
    comentarios: $('#fComentarios').value.trim(),
  };
}

function guardar(){
  if (!CARGA.length){ alert('Agregue al menos una línea de carga antes de guardar.'); return; }
  const header = leerCabecera();
  const lineas = CARGA.map((l, i) => ({
    linea: i + 1,
    pedido: l.base + '-' + l.pos,
    entrega: l.entrega ? (l.entrega + '-1') : '0-0',
    codCliente: l.codCli,
    nomCliente: l.nomCli,
    material: l.material,
    direccion: l.dirEnvio,
    udsHechas: 0, udsTotal: l.tipoUnidad,
    palHechas: 0, palTotal: l.palets,
    completar: l.completo,
    almDest: '', anioDoc: '', docTraslado: 0,
  }));
  const payload = { header, lineas, ts: Date.now() };

  let entregado = false;
  try { if (window.opener && !window.opener.closed){ window.opener.postMessage({ type:'PERSEIDA_NUEVO_CAMION', payload }, '*'); entregado = true; } } catch(e){}
  try { localStorage.setItem('PERSEIDA_NUEVO_CAMION', JSON.stringify(payload)); } catch(e){}

  $('#savedMsg').textContent = entregado
    ? 'Camión guardado y enviado a la Pantalla de Camiones (' + lineas.length + ' línea(s)). Puede cerrar esta pestaña.'
    : 'Camión guardado (' + lineas.length + ' línea(s)). Aparecerá en la Pantalla de Camiones al volver a ella.';
  $('#saved').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  CARGA = [];
  renderCarga();
}

$('#savedClose').addEventListener('click', () => $('#saved').classList.remove('show'));

  <script>
/* =====================================================================
   PANTALLA DE CAMIONES — carga y expedición (simulación).

   - Pantalla principal: una fila por camión con su ESTADO (color), nº de
     camión, cliente, tipo, coste, fechas previstas, muelle, matrícula del
     remolque y marca de camión de traslado.
   - Al pulsar el desplegable (>) de una fila se muestra el DETALLE de las
     líneas del pedido (posiciones), con las columnas AJUSTADAS al contenido.

   Datos de EJEMPLO. Toda la lógica corre en el navegador, sin dependencias.
   Para datos reales basta sustituir el array CAMIONES (y, si procede, los
   maestros MATERIALES / CLIENTES) por la consulta correspondiente.
   ===================================================================== */

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
function esc(v){ return String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function nf(n){ const x = Math.round(Number(n) || 0); const s = String(Math.abs(x)).replace(/\B(?=(\d{3})+(?!\d))/g, '.'); return x < 0 ? '-' + s : s; }

/* ---------- Estados ---------- */
const EST = {
  'CARGADO':    { cls:'cargado',    cargado:true  },
  'EN CARGA':   { cls:'encarga',    cargado:false },
  'ALBARANADO': { cls:'albaranado', cargado:true  },
  'PTE CARGAR': { cls:'ptecargar',  cargado:false },
  'ANULADO':    { cls:'anulado',    cargado:false },
};
const FECHA_CARGA = '23/06/2026';      // fecha de la jornada (camiones del día)
const FECHA_NULA  = '01/01/1900';      // placeholder de fecha vacía (estilo SAP)

/* ---------- Generación del detalle (líneas/posiciones del camión) ---------- */
let seqEntrega = 80043120;
function genLineas(cliente, pedidoBase, estado, matCodes){
  const info = CLIENTES[cliente] || { codigo:'', dir:'' };
  const cargado = EST[estado].cargado;
  const enCarga = estado === 'EN CARGA';
  return matCodes.map((cod, i) => {
    const m = MATERIALES[cod];
    const totalUds = m.uds;                 // 1 palet por posición
    const hechasUds = cargado ? totalUds : (enCarga && i < Math.ceil(matCodes.length/2) ? totalUds : 0);
    const totalPal = 1;
    const hechasPal = cargado ? 1 : 0;
    return {
      linea: i + 1,
      pedido: pedidoBase + '-' + ((i + 1) * 10),
      entrega: cargado ? (seqEntrega++ + '-1') : '0-0',
      codCliente: info.codigo,
      nomCliente: cliente,
      material: cod + ' - ' + m.desc,
      direccion: info.dir,
      udsHechas: hechasUds, udsTotal: totalUds,
      palHechas: hechasPal, palTotal: totalPal,
      completar: false,
      almDest: '', anioDoc: '', docTraslado: 0,
    };
  });
}

let pedidoSeq = 10065060;   /* el camión 20260623-21 (PENINSULACO) queda con pedido 10065073, como en la captura */
const CAMIONES = RAW.map(r => {
  const cargado = EST[r.est].cargado || r.est === 'EN CARGA';
  const pedidoBase = String(pedidoSeq++);
  return {
    estado: r.est,
    noCamion: '20260623-' + r.n,
    cliente: r.cli,
    tipoCamion: r.est === 'ANULADO' ? '' : 'Trailer',
    coste: 0,
    almacen: r.alm,
    horaCarga: cargado ? FECHA_CARGA : FECHA_NULA,
    fechaDescarga: cargado ? FECHA_CARGA : FECHA_NULA,
    muelle: r.muelle,
    matricula: r.mat,
    traslado: false,
    pedido: pedidoBase,
    lineas: genLineas(r.cli, pedidoBase, r.est, r.mats),
  };
});
CAMIONES.forEach((c, i) => c._id = i);

/* ---------- Render del detalle (sub-tabla con columnas ajustadas) ---------- */
function detalleHTML(c){
  if (!c.lineas.length){
    return `<div class="detailwrap">
      <div class="detailtitle">Detalle del camión <span class="pill">${esc(c.noCamion)}</span></div>
      <div class="det-empty">Este camión no tiene líneas asociadas.</div>
    </div>`;
  }
  const rows = c.lineas.map(l => `
    <tr>
      <td class="d-linea">${l.linea}</td>
      <td class="d-pedido mono">${esc(l.pedido)}</td>
      <td class="d-entrega mono">${esc(l.entrega)}</td>
      <td class="d-codcli mono">${esc(l.codCliente)}</td>
      <td class="d-nomcli">${esc(l.nomCliente)}</td>
      <td class="d-material">${esc(l.material)}</td>
      <td class="d-direccion">${esc(l.direccion)}</td>
      <td class="d-uds num">${nf(l.udsHechas)} de ${nf(l.udsTotal)}</td>
      <td class="d-palets num">${l.palHechas} de ${l.palTotal}</td>
      <td class="d-completar center"><input type="checkbox" ${l.completar ? 'checked' : ''}></td>
      <td class="d-almdest mono">${esc(l.almDest)}</td>
      <td class="d-aniodoc mono">${esc(l.anioDoc)}</td>
      <td class="d-doctras num">${l.docTraslado}</td>

  return `<div class="detailwrap">
    <div class="detailtitle">Detalle del camión <span class="pill">${esc(c.noCamion)}</span> · Pedido SAP ${esc(c.pedido)} · ${c.lineas.length} línea(s)</div>
    <table class="detail">
      <thead>
        <tr>
          <th class="d-linea">Linea</th>
          <th class="d-pedido">Pedido SAP</th>
          <th class="d-entrega">Entrega SAP</th>
          <th class="d-codcli">Codigo Cliente</th>
          <th class="d-nomcli">Nombre Cliente</th>
          <th class="d-material">Material</th>
          <th class="d-direccion">Direccion de Envio</th>
          <th class="d-uds">Unidades</th>
          <th class="d-palets">Palets</th>
          <th class="d-completar">Completar Camion</th>
          <th class="d-almdest">Alm. Dest. Traslado</th>
          <th class="d-aniodoc">Año Doc. Traslado</th>
          <th class="d-doctras">Doc. Traslado SAP</th>

      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ---------- Render de la rejilla principal ---------- */
let selId = null;
const openSet = new Set();

function filaCamion(c){
  const e = EST[c.estado];
  return `
    <tr class="mainrow ${openSet.has(c._id) ? 'open' : ''} ${selId === c._id ? 'sel' : ''}" data-id="${c._id}">
      <td class="col-exp"><span class="exp-btn" data-exp="${c._id}">${openSet.has(c._id) ? '&#9660;' : '&#9654;'}</span></td>
      <td class="estado ${e.cls}">${esc(c.estado)}</td>
      <td class="mono">${esc(c.noCamion)}</td>
      <td class="cliente" title="${esc(c.cliente)}">${esc(c.cliente)}</td>
      <td>${esc(c.tipoCamion)}</td>
      <td class="num">${c.coste}</td>
      <td>${esc(c.horaCarga)}</td>
      <td>${esc(c.fechaDescarga)}</td>
      <td class="num">${c.muelle}</td>
      <td class="matricula mono" title="${esc(c.matricula)}">${esc(c.matricula)}</td>
      <td class="center"><input type="checkbox" data-traslado="${c._id}" ${c.traslado ? 'checked' : ''}></td>
    </tr>
    <tr class="detailrow ${openSet.has(c._id) ? 'show' : ''}" data-detail="${c._id}">
      <td colspan="11">${openSet.has(c._id) ? detalleHTML(c) : ''}</td>
    </tr>`;
}

/* ---------- Filtros ---------- */
function getColFilters(){
  const f = {};
  $$('.filterrow input[data-col]').forEach(inp => {
    const v = inp.value.trim().toLowerCase();
    if (v) f[inp.dataset.col] = v;
  });
  return f;
}

function visibles(){
  const q = $('#fSearch').value.trim().toLowerCase();
  const alm = $('#fAlmacen').value;
  const todos = $('#fTodos').checked;
  const cols = getColFilters();

  return CAMIONES.filter(c => {
    // Almacén
    if (alm && c.almacen !== alm) return false;
    // "Todos": si está desmarcado, solo camiones cuya carga es del día seleccionado
    if (!todos && c.horaCarga === FECHA_NULA) return false;
    // Filtros por columna
    if (cols.estado     && !c.estado.toLowerCase().includes(cols.estado)) return false;
    if (cols.noCamion   && !c.noCamion.toLowerCase().includes(cols.noCamion)) return false;
    if (cols.cliente    && !c.cliente.toLowerCase().includes(cols.cliente)) return false;
    if (cols.tipoCamion && !c.tipoCamion.toLowerCase().includes(cols.tipoCamion)) return false;
    if (cols.coste      && !String(c.coste).includes(cols.coste)) return false;
    if (cols.muelle     && !String(c.muelle).includes(cols.muelle)) return false;
    if (cols.matricula  && !c.matricula.toLowerCase().includes(cols.matricula)) return false;
    // Búsqueda global
    if (q){
      const hay = [c.estado, c.noCamion, c.cliente, c.tipoCamion, c.matricula, c.pedido]
        .join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const rows = visibles();
  const tb = $('#tbody');
  if (!rows.length){
    tb.innerHTML = `<tr><td class="nores" colspan="11">No hay camiones para los criterios seleccionados.</td></tr>`;
    return;
  }
  tb.innerHTML = rows.map(filaCamion).join('');
}

/* ---------- Eventos ---------- */
$('#tbody').addEventListener('click', e => {
  // toggle de despliegue
  const exp = e.target.closest('[data-exp]');
  if (exp){
    e.stopPropagation();
    const id = Number(exp.dataset.exp);
    if (openSet.has(id)) openSet.delete(id); else openSet.add(id);
    render();
    return;
  }
  // checkbox de "Camión Traslado" (no debe seleccionar la fila)
  const cb = e.target.closest('input[data-traslado]');
  if (cb){
    const id = Number(cb.dataset.traslado);
    const c = CAMIONES.find(x => x._id === id);
    if (c) c.traslado = cb.checked;
    return;
  }
  // selección de fila
  const tr = e.target.closest('tr.mainrow');
  if (tr){
    const id = Number(tr.dataset.id);
    selId = (selId === id) ? null : id;
    render();
  }
});

// checkboxes del detalle ("Completar Camion")
$('#tbody').addEventListener('change', e => {
  const cb = e.target.closest('.detail input[type="checkbox"]');
  if (!cb) return;
  const tr = cb.closest('tr.detailrow');
  // (en demo no persistimos el valor por línea; bastaría mapear por índice)
});

['fSearch'].forEach(id => $('#'+id).addEventListener('input', render));
['fAlmacen','fTodos','fFecha'].forEach(id => $('#'+id).addEventListener('change', render));
$$('.filterrow input[data-col]').forEach(inp => inp.addEventListener('input', render));
$('#btnActualizar').addEventListener('click', render);

$('#btnPrint').addEventListener('click', () => window.print());

// que el clic en la fila de filtros no propague a la selección
$$('.filterrow input').forEach(inp => inp.addEventListener('click', e => e.stopPropagation()));

/* =====================================================================
   NUEVO CAMIÓN — se abre en una PESTAÑA NUEVA (no en pop-up).
   La pestaña NUEVO_CAMION.html devuelve el camión guardado por
   postMessage (ventana abridora) y, como respaldo, vía localStorage
   (evento 'storage' y al recuperar el foco de esta pestaña).
   ===================================================================== */
const LS_KEY = 'PERSEIDA_NUEVO_CAMION';
let lastTs = 0;

$('#btnNuevoCamion').addEventListener('click', () => {
  // Abre una PESTAÑA NUEVA generada desde este mismo HTML (plantilla embebida,
  // sin depender de ningún archivo externo). about:blank hereda el origen de
  // esta ventana, por lo que window.opener / postMessage funcionan también en file://
  const w = window.open('', '_blank');
  if (!w){ alert('El navegador ha bloqueado la ventana emergente. Permita las ventanas emergentes para abrir «Nuevo Camión».'); return; }
  const doc = document.getElementById('tplNuevoCamion').textContent.split('<\\/script>').join('<' + '/script>');
  w.document.open();
  w.document.write(doc);
  w.document.close();
});

$('#btnAnular').addEventListener('click', () => {
  if (selId == null){ alert('Seleccione primero un camión (haga clic en su fila) para anularlo.'); return; }
  const c = CAMIONES.find(x => x._id === selId);
  if (!c) return;
  if (c.estado === 'ANULADO'){ alert('El camión ' + c.noCamion + ' ya está anulado.'); return; }
  if (confirm('¿Anular el camión ' + c.noCamion + '?')){
    c.estado = 'ANULADO';
    render();
  }
});

function addCamionFromPayload(p){
  if (!p || !p.header || !p.ts || p.ts <= lastTs) return;
  lastTs = p.ts;
  const maxN = CAMIONES.reduce((m, c) => Math.max(m, parseInt((c.noCamion.split('-')[1] || '0'), 10) || 0), 0);
  const h = p.header;
  const c = {
    estado: h.estado || 'PTE CARGAR',
    noCamion: '20260623-' + (maxN + 1),
    cliente: h.cliente || '',
    tipoCamion: h.tipoCamion || 'Trailer',
    coste: h.coste || 0,
    almacen: h.almacen || '',
    horaCarga: h.horaCarga || FECHA_NULA,
    fechaDescarga: h.fechaDescarga || FECHA_NULA,
    muelle: h.muelle || 0,
    matricula: h.matricula || '',
    traslado: !!h.traslado,
    comentarios: h.comentarios || '',
    pedido: ((p.lineas && p.lineas[0] && p.lineas[0].pedido) || '').split('-')[0],
    lineas: (p.lineas || []),
    _id: CAMIONES.length,
  };
  CAMIONES.push(c);
  selId = c._id;
  openSet.add(c._id);
  render();
  try { localStorage.removeItem(LS_KEY); } catch(e){}
  const tr = document.querySelector('tr.mainrow.sel');
  try { if (tr && tr.scrollIntoView) tr.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch(e){}
}

// 1) mensaje directo desde la pestaña abierta
window.addEventListener('message', e => {
  const d = e.data;
  if (d && d.type === 'PERSEIDA_NUEVO_CAMION') addCamionFromPayload(d.payload);
});
// 2) respaldo: cambio en localStorage desde otra pestaña
window.addEventListener('storage', e => {
  if (e.key === LS_KEY && e.newValue){
    try { addCamionFromPayload(JSON.parse(e.newValue)); } catch(_){}
  }
});
// 3) respaldo: al volver el foco a esta pestaña, comprobar si hay uno pendiente
window.addEventListener('focus', () => {
  try { const raw = localStorage.getItem(LS_KEY); if (raw) addCamionFromPayload(JSON.parse(raw)); } catch(_){}
});

/* ---------- Inicio ---------- */
render();
</script>
